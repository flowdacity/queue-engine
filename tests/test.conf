[fq]
job_expire_interval       : 5000 
job_requeue_interval      : 5000 
default_job_requeue_limit : -1 

[redis]
db                        : 0
key_prefix                : test_fq
conn_type                 : tcp_sock 
; or unix_sock
;; unix connection settings
unix_socket_path          : /tmp/redis.sock
;; tcp connection settings
port                      : 6379
host                      : 127.0.0.1
clustered                 : false
password                  :
